<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="description" content="Study Hub - The ultimate futuristic educational platform for Class 6-10 students. Get free study materials, notes, PDF resources, and interactive quizzes by Vijay Ninama." />
    <meta name="keywords" content="Study Hub, StudyHub Omega, Vijay Ninama, Class 6-10 notes, Free study materials, NCERT solutions, educational platform, student notes" />
    <meta name="author" content="Vijay Ninama" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studyhub-omega.vercel.app/" />
    <meta property="og:title" content="Study Hub | The Future of Learning" />
    <meta property="og:description" content="Access premium study materials, interactive quizzes, and organized notes for Class 6-10. Built for students who aim higher." />
    <meta property="og:image" content="https://studyhub-omega.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://studyhub-omega.vercel.app/" />
    <meta property="twitter:title" content="Study Hub | The Future of Learning" />
    <meta property="twitter:description" content="Access premium study materials, interactive quizzes, and organized notes for Class 6-10." />
    <meta property="twitter:image" content="https://studyhub-omega.vercel.app/og-image.png" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Study Hub",
      "alternateName": "StudyHub Omega",
      "url": "https://studyhub-omega.vercel.app/",
      "logo": "https://studyhub-omega.vercel.app/favicon.svg",
      "description": "A futuristic educational platform for Class 6-10 with study materials and quizzes.",
      "author": {
        "@type": "Person",
        "name": "Vijay Ninama"
      }
    }
    </script>

    <title>Study Hub | Better Way to Learn Class 6-10</title>
    
    <!-- Preload Critical Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Critical CSS for First Paint -->
    <style>
      :root {
        --dark-bg: #0f172a;
        --primary-blue: #00f2ff;
      }
      body {
        margin: 0;
        background-color: var(--dark-bg);
        color: white;
        font-family: 'Inter', sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      .loading-spinner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 48px;
        height: 48px;
        border: 4px solid var(--primary-blue);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
  </body>
</html>
